<svg width="108" height="108" viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF7F28"/>
      <stop offset="50%"  stop-color="#FF5062"/>
      <stop offset="100%" stop-color="#FD0E93"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect width="108" height="108" rx="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" rx="30" fill="url(#bg)"/>

  <!-- Shimmer overlay -->
  <rect width="108" height="108" rx="30" fill="url(#shimmer)" clip-path="url(#round)"/>

  <!-- Letter T — blurred glow layer -->
  <rect x="27" y="26" width="54" height="14" rx="7" fill="#FFFAF9" fill-opacity="0.5" filter="url(#glow)"/>
  <rect x="47" y="38" width="14" height="36" rx="7" fill="#FFFAF9" fill-opacity="0.5" filter="url(#glow)"/>

  <!-- Letter T — solid layer -->
  <rect x="27" y="26" width="54" height="14" rx="7" fill="#FFFAF9"/>
  <rect x="47" y="38" width="14" height="36" rx="7" fill="#FFFAF9"/>
</svg>
